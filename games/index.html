<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKY ASSAULT — Ultimate Defense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #050309;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    position: fixed; /* Prevents mobile bounce scroll */
    touch-action: none; /* Prevents gestures from scrolling/zooming */
    -webkit-user-select: none; user-select: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a0a14 0%, #050309 70%);
  }
  #wrap {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100vw; max-height: 100vh;
    aspect-ratio: 9 / 7;
    box-shadow: 0 0 60px rgba(255, 182, 39, 0.25), 0 0 120px rgba(255, 46, 136, 0.15);
    border: 2px solid #ffb627;
    background: #0a0612;
    cursor: crosshair;
    touch-action: none;
  }
  #hint {
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    color: rgba(254, 243, 199, 0.5);
    font-size: 7px; letter-spacing: 1px;
    pointer-events: none;
    text-align: center;
    white-space: normal;
    width: 90%;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="700"></canvas>
  <div id="hint">DESKTOP: WASD MOVE · MOUSE AIM · SPACE FIRE · SHIFT MISSILE · N NUKE · Q SMOKE<br>MOBILE: LEFT=MOVE · RIGHT SWIPE=SHOOT · 1/2/3/4 TAPS=SHOOT/MISSILE/SMOKE/NUKE</div>
</div>
<script>
// ====== 核心常量 ======
const W = 900, H = 700;
const GROUND_Y = H - 50;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ====== 游戏状态 ======
const state = {
  mode: 'menu',
  score: 0,
  highScore: parseInt(localStorage.getItem('skyAssaultHigh') || '0'),
  wave: 0,
  combo: 1,
  comboTimer: 0,
  shake: 0,
  flash: 0,
  time: 0,
  player: null,
  bullets: [],
  enemyBullets: [],
  missiles: [],
  enemies: [],
  particles: [],
  effects: [],
  pickups: [],
  popups: [],
  stars: [],
  groundDecor: [],
  spawnTimer: 0,
  waveActive: false,
  killsThisWave: 0,
  enemiesInWave: 0,
  waveAnnounce: 0,
  waveAnnounceText: '',
  jetActive: false,
  jetSpawned: false,
  isMobile: false,
};

// ====== 输入 ======
const keys = {};
let mouse = { x: W/2, y: H/2 };

// 触摸跟踪
const touches = { move: null, action: null };
let tapCount = 0;
let tapTimeout = null;
let lastTapX = 0, lastTapY = 0;

addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'Space' && state.mode === 'menu') startGame();
  if (e.code === 'KeyR' && (state.mode === 'over' || state.mode === 'won')) startGame();
});
addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (W / r.width);
  mouse.y = (e.clientY - r.top) * (H / r.height);
});

canvas.addEventListener('mousedown', e => {
  if (state.mode === 'menu' || state.mode === 'over' || state.mode === 'won') {
    const bx = W/2 - 110, by = state.mode === 'menu' ? H/2 + 80 : H/2 + 130, bw = 220, bh = 52;
    if (mouse.x >= bx && mouse.x <= bx + bw && mouse.y >= by && mouse.y <= by + bh) {
      startGame();
    }
  }
  if (e.button === 2 && state.mode === 'playing') keys['MouseRight'] = true;
  if (e.button === 0 && state.mode === 'playing') keys['MouseLeft'] = true;
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 2) keys['MouseRight'] = false;
  if (e.button === 0) keys['MouseLeft'] = false;
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

// 触摸事件
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  
  if (state.mode !== 'playing') {
    // 处理菜单触摸点击
    const t = e.changedTouches[0];
    const tx = (t.clientX - rect.left) * (W / rect.width);
    const ty = (t.clientY - rect.top) * (H / rect.height);
    const bx = W/2 - 110, by = state.mode === 'menu' ? H/2 + 80 : H/2 + 130, bw = 220, bh = 52;
    if (tx >= bx && tx <= bx + bw && ty >= by && ty <= by + bh) {
      startGame();
    }
    return;
  }

  for (const t of e.changedTouches) {
    const x = (t.clientX - rect.left) * (W / rect.width);
    const y = (t.clientY - rect.top) * (H / rect.height);
    
    if (x < W / 2 && !touches.move) {
      touches.move = { id: t.identifier, startX: x, startY: y, x: x, y: y };
    } else if (x >= W / 2 && !touches.action) {
      touches.action = { id: t.identifier, startX: x, startY: y, x: x, y: y, startTime: Date.now(), isSwipe: false };
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    const x = (t.clientX - rect.left) * (W / rect.width);
    const y = (t.clientY - rect.top) * (H / rect.height);
    
    if (touches.move && touches.move.id === t.identifier) {
      touches.move.x = x;
      touches.move.y = y;
    }
    if (touches.action && touches.action.id === t.identifier) {
      touches.action.x = x;
      touches.action.y = y;
      const dx = x - touches.action.startX;
      const dy = y - touches.action.startY;
      if (Math.hypot(dx, dy) > 20) {
        touches.action.isSwipe = true;
        keys['MouseLeft'] = true; // 触发持续射击
      }
    }
  }
}, { passive: false });

function handleTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touches.move && touches.move.id === t.identifier) {
      touches.move = null;
    }
    if (touches.action && touches.action.id === t.identifier) {
      if (touches.action.isSwipe) {
        keys['MouseLeft'] = false; // 停止持续射击
      } else {
        // 它是一个点击
        lastTapX = touches.action.x;
        lastTapY = touches.action.y;
        tapCount++;
        if (tapTimeout) clearTimeout(tapTimeout);
        tapTimeout = setTimeout(executeTap, 280);
      }
      touches.action = null;
    }
  }
}
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

function executeTap() {
  if (!state.player || state.mode !== 'playing') { tapCount = 0; return; }
  
  // 瞄准点击位置
  let ax = lastTapX - state.player.x;
  let ay = lastTapY - (state.player.y - 8);
  if (ay > -8) ay = -8;
  state.player.aimAngle = Math.atan2(ay, ax);

  if (tapCount === 1) {
    // 单击：发射散弹
    state.player.shoot();
    state.player.shoot();
    state.player.shoot();
  } else if (tapCount === 2) {
    // 双击：导弹
    state.player.tryFireMissile();
  } else if (tapCount === 3) {
    // 三击：烟幕
    if (state.player.smokeUnlocked && state.player.smokeCooldown <= 0) {
      state.player.smokeActive = 5.0;
      state.player.smokeCooldown = state.player.smokeMaxCooldown;
      state.popups.push(new Popup(state.player.x, state.player.y - 40, 'SMOKE SCREEN!', '#06d6a0'));
    }
  } else if (tapCount >= 4) {
    // 四击：核弹
    if (state.player.nukeUnlocked && state.player.nukeCooldown <= 0) {
      state.player.detonateNuke();
    }
  }
  tapCount = 0;
}

// ====== 星空 & 地面装饰 ======
for (let i = 0; i < 120; i++) {
  state.stars.push({ x: Math.random() * W, y: Math.random() * (H - 100), z: Math.random() * 0.8 + 0.2, s: Math.random() * 1.5 + 0.5 });
}
for (let i = 0; i < 30; i++) {
  state.groundDecor.push({ x: Math.random() * W, y: GROUND_Y + Math.random() * 40, w: 4 + Math.random() * 10, h: 2 + Math.random() * 4, c: ['#2a1810','#1a0e08','#3a2820'][Math.floor(Math.random()*3)] });
}
for (let i = 0; i < 8; i++) {
  state.groundDecor.push({ x: Math.random() * W, y: GROUND_Y - 3, w: 12 + Math.random() * 8, h: 6, c: '#3a2820', type: 'sandbag' });
}

// ====== 音效 ======
let audioCtx = null;
function initAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { audioCtx = null; } }
}
function playSound(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  if (type === 'shoot') {
    const o = audioCtx.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(700, t); o.frequency.exponentialRampToValueAtTime(150, t + 0.06);
    g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    o.connect(g); o.start(t); o.stop(t + 0.08);
  } else if (type === 'hit') {
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(160, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
    g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.connect(g); o.start(t); o.stop(t + 0.11);
  } else if (type === 'explode') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 1.5);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
    g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    src.connect(f); f.connect(g); src.start(t);
  } else if (type === 'damage') {
    const o = audioCtx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.3);
    g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); o.start(t); o.stop(t + 0.3);
  } else if (type === 'powerup') {
    [440, 660, 880, 1320].forEach((f, i) => {
      const o = audioCtx.createOscillator(); const gg = audioCtx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      gg.gain.setValueAtTime(0.08, t + i * 0.05); gg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.1);
      o.connect(gg); gg.connect(audioCtx.destination);
      o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.1);
    });
  } else if (type === 'wave') {
    [330, 415, 523, 659].forEach((f, i) => {
      const o = audioCtx.createOscillator(); const gg = audioCtx.createGain();
      o.type = 'square'; o.frequency.value = f;
      gg.gain.setValueAtTime(0.08, t + i * 0.1); gg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.18);
      o.connect(gg); gg.connect(audioCtx.destination);
      o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.18);
    });
  } else if (type === 'missile') {
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(280, t + 0.3);
    g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); o.start(t); o.stop(t + 0.3);
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length) * 0.3;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const gg2 = audioCtx.createGain(); gg2.gain.value = 0.06;
    src.connect(gg2); gg2.connect(audioCtx.destination); src.start(t);
  } else if (type === 'bigboom') {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.7, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 1.2);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 400;
    g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    src.connect(f); f.connect(g); src.start(t);
  } else if (type === 'whistle') {
    const o = audioCtx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(300, t); o.frequency.exponentialRampToValueAtTime(1200, t + 0.8);
    g.gain.setValueAtTime(0.04, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    o.connect(g); o.start(t); o.stop(t + 0.8);
  } else if (type === 'siren') {
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(400, t); o.frequency.linearRampToValueAtTime(600, t + 0.2);
    o.frequency.linearRampToValueAtTime(400, t + 0.4);
    g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.connect(g); o.start(t); o.stop(t + 0.4);
  } else if (type === 'nuke') {
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(50, t); o.frequency.exponentialRampToValueAtTime(20, t + 1.0);
    g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    o.connect(g); o.start(t); o.stop(t + 1.0);
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.0, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 1.0);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const gg2 = audioCtx.createGain(); gg2.gain.value = 0.4;
    src.connect(gg2); gg2.connect(audioCtx.destination); src.start(t);
  } else if (type === 'spider') {
    const o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(150, t); o.frequency.linearRampToValueAtTime(80, t + 0.5);
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.connect(g); o.start(t); o.stop(t + 0.5);
  }
}

// ====== 士兵（玩家）======
class Soldier {
  constructor() {
    this.x = W / 2; this.y = GROUND_Y - 20;
    this.w = 28; this.h = 44; this.speed = 300;
    this.hp = 100; this.maxHp = 100;
    this.fireCooldown = 0; this.fireRate = 0.14;
    this.missileCooldown = 0; this.missileMaxCooldown = 3.0;
    this.invuln = 0; this.rapidFire = 0; this.spread = 0;
    this.aimAngle = -Math.PI / 2;
    this.walkAnim = 0; this.moving = false;
    this.muzzleFlash = 0; this.missileHeld = false;
    this.nukeUnlocked = false; this.nukeCooldown = 0; this.nukeMaxCooldown = 30.0; this.nukeHeld = false;
    this.smokeUnlocked = false; this.smokeCooldown = 0; this.smokeMaxCooldown = 15.0; this.smokeActive = 0; this.smokeHeld = false;
  }
  update(dt) {
    let dx = 0, dy = 0;

    // 移动控制 (桌面 vs 移动)
    if (touches.move) {
      let tdx = touches.move.x - touches.move.startX;
      let tdy = touches.move.y - touches.move.startY;
      let tdist = Math.hypot(tdx, tdy);
      if (tdist > 10) {
        dx = tdx / tdist;
        dy = tdy / tdist;
      }
    } else {
      if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
      if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
      if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
      if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
    }

    if (dx && dy) { dx *= 0.707; dy *= 0.707; }
    this.moving = (dx !== 0 || dy !== 0);
    if (this.moving) this.walkAnim += dt * 14;

    this.x += dx * this.speed * dt;
    this.y += dy * this.speed * dt;
    this.x = Math.max(25, Math.min(W - 25, this.x));
    this.y = Math.max(H - 180, Math.min(GROUND_Y - 15, this.y));

    // 瞄准控制 (桌面 vs 移动)
    if (touches.action && touches.action.isSwipe) {
      let ax = touches.action.x - this.x;
      let ay = touches.action.y - (this.y - 8);
      if (ay > -8) ay = -8;
      this.aimAngle = Math.atan2(ay, ax);
    } else {
      let ax = mouse.x - this.x;
      let ay = mouse.y - (this.y - 8);
      if (ay > -8) ay = -8;
      this.aimAngle = Math.atan2(ay, ax);
    }

    // 步枪射击
    this.fireCooldown -= dt;
    if ((keys['Space'] || keys['MouseLeft']) && this.fireCooldown <= 0) {
      this.shoot();
      this.fireCooldown = this.rapidFire > 0 ? this.fireRate * 0.45 : this.fireRate;
    }

    // 导弹射击 (桌面)
    const missileKey = keys['ShiftLeft'] || keys['ShiftRight'] || keys['MouseRight'];
    if (missileKey && !this.missileHeld) {
      this.missileHeld = true;
      this.tryFireMissile();
    }
    if (!missileKey) this.missileHeld = false;

    // 核弹 (桌面)
    if (this.nukeUnlocked) {
      if (this.nukeCooldown > 0) this.nukeCooldown -= dt;
      if (keys['KeyN'] && !this.nukeHeld) { this.nukeHeld = true; this.detonateNuke(); }
      if (!keys['KeyN']) this.nukeHeld = false;
    }

    // 烟幕 (桌面)
    if (this.smokeUnlocked) {
      if (this.smokeCooldown > 0) this.smokeCooldown -= dt;
      if (this.smokeActive > 0) {
        this.smokeActive -= dt;
        if (Math.random() < 0.8) {
          state.particles.push(new Particle(this.x + (Math.random()-0.5)*40, this.y - 30 + (Math.random()-0.5)*30, (Math.random()-0.5)*30, -Math.random()*20 - 10, 'rgba(70,70,70,0.7)', 1.5, 20));
        }
      }
      if (keys['KeyQ'] && !this.smokeHeld && this.smokeCooldown <= 0) {
        this.smokeHeld = true; this.smokeActive = 5.0; this.smokeCooldown = this.smokeMaxCooldown;
        state.popups.push(new Popup(this.x, this.y - 40, 'SMOKE SCREEN!', '#06d6a0'));
      }
      if (!keys['KeyQ']) this.smokeHeld = false;
    }

    if (this.rapidFire > 0) this.rapidFire -= dt;
    if (this.spread > 0) this.spread -= dt;
    if (this.invuln > 0) this.invuln -= dt;
    if (this.missileCooldown > 0) this.missileCooldown -= dt;
    if (this.muzzleFlash > 0) this.muzzleFlash -= dt * 8;
  }
  shoot() {
    const ox = this.x; const oy = this.y - 8; const rlen = 26;
    const bx = ox + Math.cos(this.aimAngle) * rlen; const by = oy + Math.sin(this.aimAngle) * rlen;
    const speed = 800;
    if (this.spread > 0) {
      const spread = 0.18;
      state.bullets.push(new Bullet(bx, by, Math.cos(this.aimAngle - spread) * speed, Math.sin(this.aimAngle - spread) * speed, 'player'));
      state.bullets.push(new Bullet(bx, by, Math.cos(this.aimAngle) * speed, Math.sin(this.aimAngle) * speed, 'player'));
      state.bullets.push(new Bullet(bx, by, Math.cos(this.aimAngle + spread) * speed, Math.sin(this.aimAngle + spread) * speed, 'player'));
    } else {
      state.bullets.push(new Bullet(bx, by, Math.cos(this.aimAngle) * speed, Math.sin(this.aimAngle) * speed, 'player'));
    }
    this.muzzleFlash = 1;
    for (let i = 0; i < 4; i++) {
      const a = this.aimAngle + (Math.random() - 0.5) * 0.5; const s = Math.random() * 150 + 50;
      state.particles.push(new Particle(bx, by, Math.cos(a) * s, Math.sin(a) * s, '#fff200', 0.15, 3));
    }
    state.particles.push(new Particle(this.x, this.y - 6, (Math.random() - 0.3) * 60, -Math.random() * 80, '#ffb627', 0.5, 2));
    playSound('shoot');
  }
  tryFireMissile() {
    if (this.missileCooldown > 0) return;
    this.missileCooldown = this.missileMaxCooldown;
    const m = new Missile(this.x, this.y - 15); state.missiles.push(m); playSound('missile');
    for (let i = 0; i < 12; i++) {
      state.particles.push(new Particle(this.x, this.y - 10, (Math.random() - 0.5) * 120, -Math.random() * 120, ['#fff200','#ffb627','#fff'][Math.floor(Math.random()*3)], 0.3, 4));
    }
  }
  detonateNuke() {

class Particle { constructor(x, y, vx, vy, color, life, size) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.life = life; this.maxLife = life; this.size = size; } update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.vx *= 0.94; this.vy *= 0.94; this.life -= dt; } draw() { const a = Math.max(0, this.life / this.maxLife); ctx.globalAlpha = a; ctx.fillStyle = this.color; const s = Math.max(0.5, this.size * a); ctx.fillRect(this.x - s/2, this.y - s/2, s, s); ctx.globalAlpha = 1; } }

function startWave(n) {
  state.wave = n; state.killsThisWave = 0; state.enemiesInWave = 4 + n * 2; state.spawnTimer = 0.8; state.waveActive = true;
  state.waveAnnounce = 2.2; state.waveAnnounceText = `WAVE ${n}`; state.jetSpawned = false; state.jetActive = false;
  if (n == 20) { state.waveAnnounceText = `WAVE 20 — DEMONIC SPIDER`; state.enemiesInWave = 1; state.enemies.push(new DemonicSpider()); return; }
  if (n >= 12) { state.waveAnnounceText = `WAVE ${n} — EXTREME JETS`; state.enemiesInWave = 15 + n * 3; }
  if (n >= 8) {
    state.player.nukeUnlocked = true;
    state.player.smokeUnlocked = true;
    if (n === 8) state.waveAnnounceText = `WAVE 8 — ABILITIES UNLOCKED!`;
  }
  if (n > 1) playSound('wave');
}

function spawnEnemy() {
  if (state.wave == 20) return;
  if (state.wave >= 12) { const r = Math.random(); if (r < 0.05) { state.enemies.push(new Helicopter()); } else { const jr = Math.random(); if (jr < 0.4) state.enemies.push(new FighterJet('fast')); else if (jr < 0.7) state.enemies.push(new FighterJet('heavy')); else state.enemies.push(new FighterJet('standard')); } return; }
  if (state.wave >= 8) { const r = Math.random(); if (r < 0.3) state.enemies.push(new Helicopter()); else if (r < 0.5) state.enemies.push(new ParachuteBomb(60 + Math.random() * (W - 120), -50)); else state.enemies.push(new FighterJet('standard')); return; }
  if (state.wave >= 5) { if (!state.jetSpawned && state.killsThisWave + state.enemies.length >= Math.floor(state.enemiesInWave / 2)) { state.enemies.push(new FighterJet('standard')); state.jetSpawned = true; state.jetActive = true; playSound('siren'); state.popups.push(new Popup(W/2, H/2 + 60, 'FIGHTER JET INCOMING!', '#ff3838')); return; } const r = Math.random(); if (r < 0.3) state.enemies.push(new Helicopter()); else state.enemies.push(new ParachuteBomb(60 + Math.random() * (W - 120), -50)); return; }
  const r = Math.random(); if (state.wave >= 2 && r < 0.2 + state.wave * 0.03) { state.enemies.push(new Helicopter()); } else { state.enemies.push(new ParachuteBomb(60 + Math.random() * (W - 120), -50)); }
}

function gameOver() { state.mode = 'over'; if (state.score > state.highScore) { state.highScore = state.score; try { localStorage.setItem('skyAssaultHigh', state.score); } catch(e) {} } for (let i = 0; i < 60; i++) { const a = Math.random() * Math.PI * 2; const s = Math.random() * 300 + 80; state.particles.push(new Particle(state.player.x, state.player.y, Math.cos(a)*s, Math.sin(a)*s, ['#ff3838','#ffb627','#fff','#fff200','#ff2e88'][Math.floor(Math.random()*5)], 1.3, 6)); } state.shake = 24; playSound('explode'); }
function gameWin() { state.mode = 'won'; if (state.score > state.highScore) { state.highScore = state.score; try { localStorage.setItem('skyAssaultHigh', state.score); } catch(e) {} } for (let i = 0; i < 100; i++) { const a = Math.random() * Math.PI * 2; const s = Math.random() * 400 + 100; state.particles.push(new Particle(W/2, H/2, Math.cos(a)*s, Math.sin(a)*s, ['#06d6a0','#ffb627','#fff','#fff200','#ff2e88'][Math.floor(Math.random()*5)], 2.0, 8)); } state.shake = 30; playSound('powerup'); }

function startGame() { initAudio(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); state.mode = 'playing'; state.score = 0; state.combo = 1; state.comboTimer = 0; state.wave = 0; state.bullets = []; state.enemyBullets = []; state.missiles = []; state.enemies = []; state.particles = []; state.effects = []; state.pickups = []; state.popups = []; state.player = new Soldier(); state.shake = 0; state.flash = 0; state.jetActive = false; state.jetSpawned = false; startWave(1); }

function update(dt) {
  state.time += dt;
  state.stars.forEach(s => { s.y += s.z * 30 * dt; if (s.y > H - 100) { s.y = -2; s.x = Math.random() * W; } });
  if (state.waveAnnounce > 0) state.waveAnnounce -= dt;
  if (state.mode !== 'playing') { state.particles = state.particles.filter(p => { p.update(dt); return p.life > 0; }); state.effects = state.effects.filter(e => { e.update(dt); return e.life > 0; }); state.shake *= 0.9; return; }
  if (state.comboTimer > 0) { state.comboTimer -= dt; if (state.comboTimer <= 0) state.combo = 1; }
  state.shake *= 0.86; state.flash *= 0.9;
  state.player.update(dt);
  state.bullets = state.bullets.filter(b => { b.update(dt); return b.life > 0 && b.y > -30 && b.y < H + 30 && b.x > -30 && b.x < W + 30; });
  state.enemyBullets = state.enemyBullets.filter(b => { b.update(dt); return b.life > 0 && b.y > -30 && b.y < H + 30 && b.x > -30 && b.x < W + 30; });
  state.missiles = state.missiles.filter(m => { m.update(dt); return !m.dead; });
  state.enemies = state.enemies.filter(e => { e.update(dt); return !e.dead; });
  state.particles = state.particles.filter(p => { p.update(dt); return p.life > 0; });
  state.effects = state.effects.filter(e => { e.update(dt); return e.life > 0; });
  state.pickups = state.pickups.filter(p => { p.update(dt); return !p.dead; });
  state.popups = state.popups.filter(p => { p.update(dt); return p.life > 0; });

  if (state.waveActive) { state.spawnTimer -= dt; const maxConcurrent = state.wave == 20 ? 1 : 5 + state.wave * 2; if (state.spawnTimer <= 0 && state.enemies.length < maxConcurrent && state.killsThisWave + state.enemies.length < state.enemiesInWave) { spawnEnemy(); state.spawnTimer = Math.max(0.35, 1.3 - state.wave * 0.07); } }
  if (state.waveActive && state.killsThisWave >= state.enemiesInWave && state.enemies.length === 0) { state.waveActive = false; if (state.wave == 20) { gameWin(); } else { setTimeout(() => { if (state.mode === 'playing') startWave(state.wave + 1); }, 1800); } }

  for (const b of state.bullets) { if (b.life <= 0) continue; for (const e of state.enemies) { if (e.dead) continue; const d = Math.hypot(b.x - e.x, b.y - e.y); if (d < (e.hitRadius || 24)) { b.life = 0; e.damage(10); for (let i = 0; i < 5; i++) { state.particles.push(new Particle(b.x, b.y, (Math.random()-0.5)*160, (Math.random()-0.5)*160, '#fff200', 0.25, 3)); } break; } } }
  for (const b of state.enemyBullets) { if (b.life <= 0 || state.player.invuln > 0) continue; const d = Math.hypot(b.x - state.player.x, b.y - state.player.y); if (d < 18) { b.life = 0; state.player.damage(12); } }
  for (const e of state.enemies) { if (e.dead || state.player.invuln > 0) continue; const d = Math.hypot(e.x - state.player.x, e.y - state.player.y); if (d < 30) { e.die(); state.player.damage(20); } }

function drawBackground() {

  ctx.fillStyle = 'rgba(74, 222, 128, 0.04)'; for (let i = 0; i < 2; i++) { const y = ((state.time * 10 + i * 320 + 100) % (H + 200)) - 100; ctx.beginPath(); ctx.ellipse(W/2 - Math.cos(i + state.time * 0.2) * 220, y, 280, 40, 0, 0, Math.PI * 2); ctx.fill(); }

  ctx.fillStyle = '#4a3525'; ctx.fillRect(0, GROUND_Y - 5, W, 2); ctx.fillStyle = '#2a1810'; ctx.fillRect(0, GROUND_Y - 3, W, 1);
  state.groundDecor.forEach(d => { ctx.fillStyle = d.c; if (d.type === 'sandbag') { ctx.fillRect(d.x, d.y, d.w, d.h); ctx.fillStyle = '#2a1810'; ctx.fillRect(d.x, d.y + d.h - 1, d.w, 1); ctx.fillStyle = '#4a3525'; ctx.fillRect(d.x + 2, d.y + 1, d.w - 4, 1); } else { ctx.fillRect(d.x, d.y, d.w, d.h); } });
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 1);
}

function drawAbility(x, y, key, name, unlocked, ready, ratio, color) {
  if (!unlocked) { ctx.fillStyle = 'rgba(30, 30, 30, 0.7)'; ctx.fillRect(x - 5, y - 5, 110, 26); ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.strokeRect(x - 5, y - 5, 110, 26); ctx.fillStyle = '#666'; ctx.font = '7px "Press Start 2P"'; ctx.textAlign = 'left'; ctx.fillText(`${name} [LOCKED]`, x, y + 8); return; }
  ctx.fillStyle = 'rgba(10, 6, 18, 0.85)'; ctx.fillRect(x - 5, y - 5, 110, 26); ctx.strokeStyle = ready ? color : '#666'; ctx.lineWidth = 2; ctx.strokeRect(x - 5, y - 5, 110, 26);
  ctx.fillStyle = '#fef3c7'; ctx.font = '7px "Press Start 2P"'; ctx.textAlign = 'left'; ctx.fillText(`${name} [${key}]`, x, y - 8);
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(x, y, 80, 10);

  ctx.fillStyle = '#fef3c7'; ctx.font = '9px "Press Start 2P"'; ctx.textAlign = 'left'; ctx.fillText('SCORE', 22, 18); ctx.font = '16px "Press Start 2P"'; ctx.fillStyle = '#ffb627'; ctx.fillText(String(state.score).padStart(6, '0'), 22, 40);
  ctx.fillStyle = '#fef3c7'; ctx.font = '9px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.fillText('HIGH', W/2, 18); ctx.fillStyle = '#fff200'; ctx.font = '14px "Press Start 2P"'; ctx.fillText(String(state.highScore).padStart(6, '0'), W/2, 40);
  ctx.fillStyle = '#fef3c7'; ctx.font = '9px "Press Start 2P"'; ctx.textAlign = 'right'; ctx.fillText('WAVE', W - 22, 18); ctx.fillStyle = '#06d6a0'; ctx.font = '16px "Press Start 2P"'; ctx.fillText(String(state.wave).padStart(2, '0'), W - 22, 40);
  const hbW = 200, hbH = 16; const hbX = 22, hbY = H - 30; ctx.fillStyle = 'rgba(10, 6, 18, 0.85)'; ctx.fillRect(hbX - 5, hbY - 5, hbW + 10, hbH + 10); ctx.strokeStyle = '#ffb627'; ctx.lineWidth = 2; ctx.strokeRect(hbX - 5, hbY - 5, hbW + 10, hbH + 10); ctx.fillStyle = '#1a0a0a'; ctx.fillRect(hbX, hbY, hbW, hbH); const hpRatio = Math.max(0, state.player.hp / state.player.maxHp); const hpColor = hpRatio > 0.5 ? '#06d6a0' : hpRatio > 0.25 ? '#ffb627' : '#ff3838'; ctx.fillStyle = hpColor; ctx.fillRect(hbX, hbY, hbW * hpRatio, hbH); ctx.fillStyle = 'rgba(0,0,0,0.4)'; for (let i = 1; i < 10; i++) ctx.fillRect(hbX + (hbW/10)*i, hbY, 1, hbH); ctx.fillStyle = '#fef3c7'; ctx.font = '7px "Press Start 2P"'; ctx.textAlign = 'left'; ctx.fillText('HULL', hbX, hbY - 9); ctx.textAlign = 'right'; ctx.fillText(`${Math.ceil(state.player.hp)}/${state.player.maxHp}`, hbX + hbW, hbY - 9);
  const mcX = W/2 - 70, mcY = H - 30; drawAbility(mcX, mcY, '2x', 'MISSILE', true, state.player.missileCooldown <= 0, 1 - state.player.missileCooldown / state.player.missileMaxCooldown, '#ff2e88');
  const nkX = 22, nkY = H - 60; const smX = 140, smY = H - 60; drawAbility(nkX, nkY, '4x', 'NUKE', state.player.nukeUnlocked, state.player.nukeUnlocked && state.player.nukeCooldown <= 0, state.player.nukeUnlocked ? 1 - state.player.nukeCooldown / state.player.nukeMaxCooldown : 0, '#fff200'); drawAbility(smX, smY, '3x', 'SMOKE', state.player.smokeUnlocked, state.player.smokeUnlocked && state.player.smokeCooldown <= 0, state.player.smokeUnlocked ? 1 - state.player.smokeCooldown / state.player.smokeMaxCooldown : 0, '#06d6a0');
  if (state.combo > 1) { ctx.fillStyle = '#fff200'; ctx.font = 'bold 13px "Press Start 2P"'; ctx.textAlign = 'right'; ctx.shadowColor = '#fff200'; ctx.shadowBlur = 8; ctx.fillText(`x${state.combo} COMBO`, W - 22, H - 34); ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255, 242, 0, 0.25)'; ctx.fillRect(W - 122, H - 24, 100 * (state.comboTimer / 2.2), 3); }

  ctx.textAlign = 'center';
  const hx1 = ((state.time * 80) % (W + 200)) - 100; drawDecoHeli(hx1, 110, 1); const hx2 = W - ((state.time * 60 + 400) % (W + 200)) + 100; drawDecoHeli(hx2, 170, -1); const jx = ((state.time * 300) % (W + 200)) - 100; drawDecoJet(jx, 80, 1);
  const colors = ['#ff2e88','#06d6a0','#ffb627','#fef3c7']; colors.forEach((c, i) => { const x = W/5 * (i + 1); const y = 95 + Math.sin(state.time * 1.2 + i * 0.7) * 12; drawDecoBomb(x, y, c, state.time + i); }); drawDecoSoldier(W/2, H - 80);
  const titleY = H/2 - 100 + Math.sin(state.time * 2) * 4; ctx.shadowColor = '#ffb627'; ctx.shadowBlur = 30; ctx.fillStyle = '#ffb627'; ctx.font = 'bold 56px "Press Start 2P"'; ctx.fillText('SKY', W/2, titleY); ctx.shadowColor = '#ff2e88'; ctx.shadowBlur = 30; ctx.fillStyle = '#ff2e88'; ctx.fillText('ASSAULT', W/2, titleY + 62); ctx.shadowBlur = 0;
  ctx.fillStyle = '#fef3c7'; ctx.font = '10px "Press Start 2P"'; ctx.fillText('20 WAVES — HELIS, BOMBS, JETS & SPIDER', W/2, H/2 + 30);
  const bx = W/2 - 110, by = H/2 + 80, bw = 220, bh = 52; const hover = mouse.x >= bx && mouse.x <= bx + bw && mouse.y >= by && mouse.y <= by + bh; ctx.fillStyle = hover ? '#ffb627' : 'rgba(255, 182, 39, 0.18)'; ctx.fillRect(bx, by, bw, bh); ctx.strokeStyle = '#ffb627'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, bh); ctx.fillStyle = '#ffb627'; ctx.fillRect(bx, by, 8, 2); ctx.fillRect(bx, by, 2, 8); ctx.fillRect(bx + bw - 8, by, 8, 2); ctx.fillRect(bx + bw - 2, by, 2, 8); ctx.fillRect(bx, by + bh - 2, 8, 2); ctx.fillRect(bx, by + bh - 8, 2, 8); ctx.fillRect(bx + bw - 8, by + bh - 2, 8, 2); ctx.fillRect(bx + bw - 2, by + bh - 8, 2, 8); ctx.fillStyle = hover ? '#0a0612' : '#ffb627'; ctx.font = '13px "Press Start 2P"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('START [SPACE/TAP]', W/2, by + bh/2); ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#fef3c7'; ctx.font = '8px "Press Start 2P"'; ctx.fillText('WASD MOVE  ·  MOUSE AIM  ·  SPACE FIRE', W/2, H - 100); ctx.fillText('SHIFT MISSILE  ·  N NUKE  ·  Q SMOKE', W/2, H - 85); ctx.fillStyle = 'rgba(254, 243, 199, 0.6)'; ctx.fillText('MOBILE: LEFT MOVE · RIGHT SWIPE SHOOT', W/2, H - 70); ctx.fillText('TAP 1/2/3/4 TIMES: SHOOT/MISSILE/SMOKE/NUKE', W/2, H - 55);

}
function drawDecoHeli(x, y, dir) { ctx.save(); ctx.translate(x, y); ctx.scale(dir, 1); ctx.globalAlpha = 0.5; ctx.fillStyle = '#4ade80'; ctx.beginPath(); ctx.ellipse(0, 0, 16, 9, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#2d5a3d'; ctx.fillRect(-22, -2, 16, 3); ctx.fillStyle = '#06d6a0'; ctx.beginPath(); ctx.ellipse(8, -2, 6, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'rgba(220,220,220,0.3)'; ctx.fillRect(-22, -12, 44, 2); ctx.globalAlpha = 1; ctx.restore(); }
function drawDecoJet(x, y, dir) { ctx.save(); ctx.translate(x, y); ctx.scale(dir, 1); ctx.globalAlpha = 0.6; ctx.fillStyle = '#3a3a4e'; ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(5, -5); ctx.lineTo(-15, -5); ctx.lineTo(-18, 0); ctx.lineTo(-15, 5); ctx.lineTo(5, 5); ctx.closePath(); ctx.fill(); ctx.fillStyle = '#2a2a3e'; ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(-12, -12); ctx.lineTo(-16, -12); ctx.lineTo(-6, -3); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(0, 3); ctx.lineTo(-12, 12); ctx.lineTo(-16, 12); ctx.lineTo(-6, 3); ctx.closePath(); ctx.fill(); ctx.fillStyle = '#ff3838'; ctx.beginPath(); ctx.ellipse(6, -1, 4, 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#fff200'; ctx.fillRect(-22, -1, 4, 2); ctx.globalAlpha = 1; ctx.restore(); }
function drawDecoBomb(x, y, color, t) { ctx.save(); ctx.translate(x, y); ctx.globalAlpha = 0.6; ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, -22, 14, Math.PI, 0); ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(-12, -22); ctx.lineTo(-7, -5); ctx.moveTo(0, -24); ctx.lineTo(0, -5); ctx.moveTo(12, -22); ctx.lineTo(7, -5); ctx.stroke(); ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.ellipse(0, 5, 9, 11, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#ff3838'; ctx.fillRect(-9, 3, 18, 2); ctx.strokeStyle = '#8a6a3a'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(0, -6); ctx.quadraticCurveTo(2, -10, 4, -13); ctx.stroke(); ctx.fillStyle = '#fff200'; ctx.beginPath(); ctx.arc(4, -13, 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; ctx.restore(); }
function drawDecoSoldier(x, y) { ctx.save(); ctx.translate(x, y); ctx.globalAlpha = 0.7; ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 22, 16, 4, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#4a5d3a'; ctx.fillRect(-7, 8, 5, 12); ctx.fillRect(2, 8, 5, 12); ctx.fillStyle = '#1a1208'; ctx.fillRect(-8, 18, 7, 5); ctx.fillRect(1, 18, 7, 5); ctx.fillStyle = '#5a6d4a'; ctx.fillRect(-11, -8, 22, 18); ctx.fillStyle = '#3a4d2a'; ctx.fillRect(-9, -6, 18, 14); ctx.fillStyle = '#2a3d1a'; ctx.fillRect(-6, -4, 12, 9); ctx.fillStyle = '#5a6d4a'; ctx.fillRect(-13, -6, 4, 8); ctx.fillRect(9, -6, 4, 8); ctx.fillStyle = '#c4a374'; ctx.fillRect(-5, -18, 10, 10); ctx.fillStyle = '#4a5d3a'; ctx.beginPath(); ctx.arc(0, -14, 8, Math.PI, 0); ctx.fill(); ctx.fillRect(-8, -14, 16, 5); ctx.fillStyle = '#2a2a2a'; ctx.fillRect(-2, -30, 4, 22); ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-1, -36, 2, 8); ctx.globalAlpha = 1; ctx.restore(); }

function drawGameOver() {
  ctx.fillStyle = 'rgba(10, 6, 18, 0.8)'; ctx.fillRect(0, 0, W, H); ctx.textAlign = 'center';
  if (state.mode === 'won') { ctx.shadowColor = '#06d6a0'; ctx.shadowBlur = 25; ctx.fillStyle = '#06d6a0'; ctx.font = 'bold 48px "Press Start 2P"'; ctx.fillText('VICTORY!', W/2, H/2 - 70); ctx.shadowBlur = 0; ctx.fillStyle = '#fef3c7'; ctx.font = '10px "Press Start 2P"'; ctx.fillText('YOU DEFEATED THE DEMONIC SPIDER', W/2, H/2 + 5); ctx.fillStyle = '#ffb627'; ctx.font = 'bold 34px "Press Start 2P"'; ctx.shadowColor = '#ffb627'; ctx.shadowBlur = 15; ctx.fillText(String(state.score), W/2, H/2 + 48); ctx.shadowBlur = 0; if (state.score >= state.highScore && state.score > 0) { ctx.fillStyle = '#fff200'; ctx.font = '11px "Press Start 2P"'; ctx.fillText('NEW HIGH SCORE!', W/2, H/2 + 78); } else { ctx.fillStyle = '#fef3c7'; ctx.font = '9px "Press Start 2P"'; ctx.fillText(`HIGH: ${state.highScore}`, W/2, H/2 + 78); } ctx.fillStyle = '#06d6a0'; ctx.font = '9px "Press Start 2P"'; ctx.fillText('YOU SURVIVED ALL 20 WAVES', W/2, H/2 + 100); }
  else { ctx.shadowColor = '#ff3838'; ctx.shadowBlur = 25; ctx.fillStyle = '#ff3838'; ctx.font = 'bold 48px "Press Start 2P"'; ctx.fillText('GAME OVER', W/2, H/2 - 70); ctx.shadowBlur = 0; ctx.fillStyle = '#fef3c7'; ctx.font = '10px "Press Start 2P"'; ctx.fillText('FINAL SCORE', W/2, H/2 + 5); ctx.fillStyle = '#ffb627'; ctx.font = 'bold 34px "Press Start 2P"'; ctx.shadowColor = '#ffb627'; ctx.shadowBlur = 15; ctx.fillText(String(state.score), W/2, H/2 + 48); ctx.shadowBlur = 0; if (state.score >= state.highScore && state.score > 0) { ctx.fillStyle = '#fff200'; ctx.font = '11px "Press Start 2P"'; ctx.fillText('NEW HIGH SCORE!', W/2, H/2 + 78); } else { ctx.fillStyle = '#fef3c7'; ctx.font = '9px "Press Start 2P"'; ctx.fillText(`HIGH: ${state.highScore}`, W/2, H/2 + 78); } ctx.fillStyle = '#06d6a0'; ctx.font = '9px "Press Start 2P"'; ctx.fillText(`SURVIVED ${state.wave} WAVE${state.wave !== 1 ? 'S' : ''}`, W/2, H/2 + 100); }
  const bx = W/2 - 110, by = H/2 + 130, bw = 220, bh = 52; const hover = mouse.x >= bx && mouse.x <= bx + bw && mouse.y >= by && mouse.y <= by + bh; ctx.fillStyle = hover ? '#ffb627' : 'rgba(255, 182, 39, 0.18)'; ctx.fillRect(bx, by, bw, bh); ctx.strokeStyle = '#ffb627'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, bh); ctx.fillStyle = '#ffb627'; ctx.fillRect(bx, by, 8, 2); ctx.fillRect(bx, by, 2, 8); ctx.fillRect(bx + bw - 8, by, 8, 2); ctx.fillRect(bx + bw - 2, by, 2, 8); ctx.fillRect(bx, by + bh - 2, 8, 2); ctx.fillRect(bx, by + bh - 8, 2, 8); ctx.fillRect(bx + bw - 8, by + bh - 2, 8, 2); ctx.fillRect(bx + bw - 2, by + bh - 8, 2, 8); ctx.fillStyle = hover ? '#0a0612' : '#ffb627'; ctx.font = '13px "Press Start 2P"'; ctx.textBaseline = 'middle'; ctx.fillText('RESTART [R/TAP]', W/2, by + bh/2); ctx.textBaseline = 'alphabetic';
}

function render() {
  ctx.save(); if (state.shake > 0.1) { ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake); } drawBackground();
  if (state.mode === 'menu') { drawMenu(); }
  else { state.pickups.forEach(p => p.draw()); state.enemies.forEach(e => e.draw()); state.enemyBullets.forEach(b => b.draw()); state.bullets.forEach(b => b.draw()); state.missiles.forEach(m => m.draw()); state.effects.forEach(e => e.draw()); state.particles.forEach(p => p.draw()); if (state.player) state.player.draw(); state.popups.forEach(p => p.draw()); drawHUD(); if (state.flash > 0.01) { ctx.fillStyle = `rgba(255, 56, 56, ${state.flash * 0.45})`; ctx.fillRect(0, 0, W, H); } if (state.mode === 'over' || state.mode === 'won') drawGameOver(); }
  const vig = ctx.createRadialGradient(W/2, H/2, H/3, W/2, H/2, H); vig.addColorStop(0, 'rgba(0,0,0,0)'); vig.addColorStop(1, 'rgba(0,0,0,0.65)'); ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H); ctx.restore();
}

let last = performance.now();
function loop(now) { const dt = Math.min(0.05, (now - last) / 1000); last = now; update(dt); render(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
